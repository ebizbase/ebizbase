
syntax = "proto3";

package localize;

import "google/protobuf/empty.proto";
import "common.proto";

message ActiveLanguage {
  string id = 1;
  string code = 2;
  string name = 3;
  bool isDefault = 4;
}

message ActiveLanguagesResponse {
  repeated ActiveLanguage active_languages = 1;
}
message Language {
  string id = 1;
  string code = 2;
  string name = 3;
  bool isDefault = 4;
  bool is_active = 5;
}
message Languages {
  repeated Language languages = 1;
}

message UpdateLanguageStatusRequest {
  repeated string ids = 1;
  bool is_active = 2;
}

message ChangeDefaultLanguageRequest {
  string id = 1;
}

service LocalizeService {
  // languages
  rpc GetActiveLanguages(google.protobuf.Empty) returns (ActiveLanguagesResponse);
  rpc ListLanguages(common.Listing) returns (Languages);
  rpc UpdateLanguages(UpdateLanguageStatusRequest) returns (Languages);
  rpc ChangeDefaultLanguage(ChangeDefaultLanguageRequest) returns (google.protobuf.Empty);

  // translations
  rpc ListTranslations(common.Listing) returns (Translations);
  rpc AddTranslations(Translations) returns (Translations);
  rpc UpdateTranslation(Translations) returns (Translations);
}


message Translation {
  string id = 1;
  string service = 2;
  string languageCode = 3;
  string key = 4;
  string value = 5;
}

message Translations {
  repeated Translation translation = 1;
}
