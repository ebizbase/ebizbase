worker_processes auto;

events {
  worker_connections 2048;
}

http {
  include mime.types;
  default_type application/octet-stream;
  sendfile on;
  gzip on;
  client_max_body_size 25M;


  map $http_upgrade $connection_upgrade {
    default upgrade;
    '' close;
  }


  # MONGODB ADMIN
  server {
    listen 80;
    server_name mongodb.fbi.com;
    include http-server.conf;
    location / {
      include http-proxy-header.conf;
      proxy_pass http://172.16.1.6:8081;
    }
  }


  # REDIS ADMIN
  server {
    listen 80;
    server_name redis.fbi.com;
    include http-server.conf;
    location / {
      include http-proxy-header.conf;
      proxy_pass http://172.16.1.8:80;
    }
  }


  # RABBITMQ ADMIN
  server {
    listen 80;
    server_name rabbitmq.fbi.com;
    include http-server.conf;
    location / {
      include http-proxy-header.conf;
      proxy_pass http://172.16.1.9:15672;
    }
  }


  # Minio Admin
  server {
    listen 80;
    server_name minio.fbi.com;
    include http-server.conf;

    location / {
      include http-proxy-header.conf;
      proxy_pass http://172.16.1.4:9001/;
    }
  }


  # Minio
  server {
    listen 80;
    server_name static.fbi.com;
    include http-server.conf;
    location / {
      include http-proxy-header.conf;
      proxy_pass http://172.16.1.4:9000;
    }
  }

  # Mailhog
  server {
    listen 80;
    server_name mail.fbi.com;
    include http-server.conf;
    location / {
      include http-proxy-header.conf;
      proxy_pass http://172.16.1.10:8025;
    }
  }

  # Coverage
  server {
    listen 80;
    server_name coverage.fbi.com;
    include http-server.conf;
    location / {
      root /var/html/coverage;
      try_files $uri $uri/ =404;
    }

  }

  server {
    listen 443;
    server_name localtest.me;
    http2 on;
    location / {
      grpc_pass grpc://172.16.1.1:443;
    }
  }

  server {
    listen 80;
    include http-server.conf;
    server_name lacolhost.com yoogle.com;
    location / {
      include http-proxy-header.conf;
      proxy_pass http://172.16.1.1:80;
    }
  }
}

stream {
  server {
    listen 27017;
    server_name mongodb.fbi.com;
    proxy_pass 172.16.1.5:27017;
  }

  server {
    listen 6379;
    server_name redis.fbi.com;
    proxy_pass 172.16.1.7:6379;
  }

  server {
    listen 5672;
    server_name rabbitmq.fbi.com;
    proxy_pass 172.16.1.9:5672;
  }

}

